<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Secure Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <span id="status-dot"></span> P2P Chat
        </div>

        <!-- SCREEN 1: Setup -->
        <div id="setup-screen">

            <div class="card">
                <h3>1. Choose Your ID</h3>
                <p class="subtitle">Pick a short ID (e.g. pexa, user1)</p>
                <div class="input-group">
                    <input type="text" id="my-id-input" placeholder="Your ID..." autocomplete="off">
                </div>
            </div>

            <div class="card">
                <h3>2. Friend's ID</h3>
                <p class="subtitle">Enter your friend's ID to chat with</p>
                <div class="input-group">
                    <input type="text" id="friend-id-input" placeholder="Friend's ID..." autocomplete="off">
                </div>
            </div>

            <button id="start-btn">Start Chat</button>

        </div>

        <!-- SCREEN 2: Chat -->
        <div id="chat-screen">
            <div id="chat-header">
                <span id="chat-title">Chatting with: </span>
                <button id="disconnect-btn">✕ Leave</button>
            </div>
            <div id="messages-container"></div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

</body>
</html>
