<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Secure Chat</title>
    
    <!-- Link external CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Load PeerJS and external Script (defer ensures they load in order) -->
    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <span id="status-dot"></span> P2P Chat
        </div>

        <!-- SCREEN 1: Setup & Connection -->
        <div id="setup-screen">
            <div class="card">
                <h3>Your Connection ID</h3>
                <p class="subtitle">Share this ID with your friend.</p>
                <div class="id-box" id="my-id" title="Click to copy">Generating...</div>
            </div>

            <div class="card">
                <h3>Connect to Friend</h3>
                <input type="text" id="friend-id" placeholder="Paste their ID here" autocomplete="off">
                <button id="connect-btn" disabled>Connect</button>
            </div>
        </div>

        <!-- SCREEN 2: Chat Interface -->
        <div id="chat-screen">
            <div id="messages-container"></div>
            
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

</body>
</html>
